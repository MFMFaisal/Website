<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Level Website</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0f2027;
  color: white;
  overflow-x: hidden;
}

/* ANIMATED BACKGROUND */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, #00f2fe, #4facfe, #43e97b);
  animation: moveBg 10s linear infinite;
  z-index: -1;
  opacity: 0.2;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%, -25%); }
  100% { transform: translate(0,0); }
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

nav h2 {
  font-weight: bold;
}

nav ul {
  display: flex;
  gap: 20px;
  list-style: none;
}

nav ul li {
  cursor: pointer;
  transition: 0.3s;
}

nav ul li:hover {
  color: #00f2fe;
}

/* MOBILE MENU */
.menu-btn {
  display: none;
  font-size: 24px;
  cursor: pointer;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.hero h1 {
  font-size: 50px;
}

.hero span {
  color: #00f2fe;
}

.typing {
  margin-top: 10px;
  font-size: 20px;
  height: 25px;
}

.btn {
  margin-top: 20px;
  padding: 12px 30px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #00f2fe, #4facfe);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

/* SCROLL ANIMATION */
.hidden {
  opacity: 0;
  transform: translateY(30px);
  transition: 0.6s;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.3);
}

/* RESPONSIVE */
@media(max-width:768px) {
  nav ul {
    display: none;
    flex-direction: column;
    position: absolute;
    background: rgba(0,0,0,0.8);
    top: 60px;
    right: 0;
    width: 200px;
    padding: 20px;
  }

  nav ul.active {
    display: flex;
  }

  .menu-btn {
    display: block;
  }

  .hero h1 {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h2>MyBrand</h2>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <ul id="menu">
    <li onclick="scrollToSection('home')">Home</li>
    <li onclick="scrollToSection('features')">Features</li>
    <li onclick="scrollToSection('contact')">Contact</li>
  </ul>
</nav>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Build <span>Something Amazing</span></h1>
  <div class="typing" id="typing"></div>
  <button class="btn" onclick="showMessage()">Get Started</button>
</section>

<!-- FEATURES -->
<section id="features" class="section hidden">
  <h2>Features</h2>
  <div class="cards">
    <div class="card">⚡ Super Fast</div>
    <div class="card">📱 Fully Responsive</div>
    <div class="card">🎨 Beautiful UI</div>
    <div class="card">🔒 Secure</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section hidden">
  <h2>Contact</h2>
  <p>Email: example@email.com</p>
</section>

<footer>
  © 2026 MyBrand
</footer>

<script>
// BUTTON
function showMessage() {
  alert("Welcome to next-level design 🚀");
}

// MOBILE MENU
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

// SMOOTH SCROLL
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({ behavior: "smooth" });
}

// TYPING EFFECT
const text = ["Modern UI", "Responsive Design", "Advanced Features"];
let i = 0, j = 0, current = "", isDeleting = false;

function type() {
  current = text[i];
  document.getElementById("typing").textContent = current.substring(0, j);

  if (!isDeleting && j < current.length) j++;
  else if (isDeleting && j > 0) j--;
  else {
    isDeleting = !isDeleting;
    if (!isDeleting) i = (i + 1) % text.length;
  }

  setTimeout(type, isDeleting ? 50 : 100);
}
type();

// SCROLL ANIMATION
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".hidden").forEach(el => observer.observe(el));
</script>

</body>
</html>
