
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Modern Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    nav h2 {
      font-size: 22px;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    nav ul li {
      cursor: pointer;
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 80vh;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 48px;
    }

    .hero p {
      margin: 15px 0;
      font-size: 18px;
      max-width: 500px;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 25px;
      border: none;
      background: white;
      color: #007BFF;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #007BFF;
      color: white;
    }

    /* CARDS SECTION */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 15px;
      background: rgba(0,0,0,0.2);
    }

    /* DARK MODE */
    .dark {
      background: #111;
      color: #eee;
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      nav ul {
        display: none;
      }

      .hero h1 {
        font-size: 32px;
      }

      .hero p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <h2>MySite</h2>
    <ul>
      <li>Home</li>
      <li>About</li>
      <li>Contact</li>
    </ul>
    <button class="btn" onclick="toggleDark()">🌙</button>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h1>Welcome 🚀</h1>
    <p>This website automatically adjusts to mobile and desktop screens.</p>
    <button class="btn" onclick="showMessage()">Click Me</button>
  </section>

  <!-- CARDS -->
  <section class="cards">
    <div class="card">
      <h3>Fast ⚡</h3>
      <p>Optimized for speed and performance.</p>
    </div>

    <div class="card">
      <h3>Responsive 📱</h3>
      <p>Works perfectly on Android, iPhone, and PC.</p>
    </div>

    <div class="card">
      <h3>Modern 🎨</h3>
      <p>Clean design with smooth effects.</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Your Name
  </footer>

  <script>
    function showMessage() {
      alert("You clicked the button! 🎉");
    }

    function toggleDark() {
      document.body.classList.toggle("dark");
    }
  </script>

</body>
</html>
