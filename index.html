<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Stylish Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      background: rgba(0,0,0,0.2);
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #007BFF;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #007BFF;
      color: white;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    My Awesome Website
  </header>

  <div class="container">
    <h1>Hello, World 👋</h1>
    <p>Welcome to my beautiful HTML page!</p>
    <button onclick="showMessage()">Click Me</button>
  </div>

  <footer>
    © 2026 Your Name
  </footer>

  <script>
    function showMessage() {
      alert("Thanks for clicking! 🚀");
    }
  </script>

</body>
</html>
