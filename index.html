<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Premium UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1503264116251-35a269479413') no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* LOGIN CARD */
.login-box {
  position: relative;
  width: 350px;
  padding: 40px;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
  text-align: center;
  color: white;
  animation: float 4s ease-in-out infinite;
}

/* FLOAT ANIMATION */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.login-box h2 {
  margin-bottom: 20px;
}

/* INPUT STYLE */
.input-box {
  position: relative;
  margin: 25px 0;
}

.input-box input {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: none;
  border-bottom: 2px solid #fff;
  outline: none;
  color: white;
  font-size: 16px;
}

.input-box label {
  position: absolute;
  left: 0;
  top: 10px;
  transition: 0.3s;
  color: #ccc;
}

/* FLOAT LABEL */
.input-box input:focus + label,
.input-box input:valid + label {
  top: -15px;
  font-size: 12px;
  color: #00f2fe;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #00f2fe, #4facfe);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00f2fe;
}

/* EXTRA LINKS */
.links {
  margin-top: 15px;
  font-size: 14px;
}

.links a {
  color: #00f2fe;
  text-decoration: none;
}

/* RESPONSIVE */
@media(max-width:400px){
  .login-box {
    width: 90%;
    padding: 30px;
  }
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login 🔐</h2>

  <div class="input-box">
    <input type="text" required>
    <label>Username</label>
  </div>

  <div class="input-box">
    <input type="password" required>
    <label>Password</label>
  </div>

  <button onclick="login()">Login</button>

  <div class="links">
    <p><a href="#">Forgot Password?</a></p>
    <p><a href="#">Create Account</a></p>
  </div>
</div>

<script>
function login() {
  alert("Login feature coming soon 🚀");
}
</script>

</body>
</html>
